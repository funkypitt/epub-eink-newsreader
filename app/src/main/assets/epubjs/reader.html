<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100vh; overflow: hidden; background: #ffffff; color: #000000; }
  /* position: fixed + inset:0 gives #viewer dimensions relative to the
     WebView's visual viewport directly. Android WebView resolves 100vh
     and 100vw to 0 in this configuration, so the four anchors are what
     stretch #viewer to the visible area. */
  #viewer {
    position: fixed; inset: 0;
    overflow: hidden;
  }
  #loading {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: monospace; font-size: 12px; color: #888;
    z-index: 5;
  }
</style>
<script src="jszip.min.js"></script>
<script src="epub.min.js"></script>
</head>
<body>
<div id="viewer"></div>
<div id="loading">Loading…</div>
<script>
// epub.js host page for the Magazine Reader. Receives ePub bytes and the
// chapter href from Android, renders the chapter in scrolled-doc mode,
// exposes goNext / goPrev / goToHref / setFontSize for the Compose
// tap-zone overlay.
//
// Why scrolled-doc and not paginated: Android WebView's CSS multi-column
// implementation clips body content past N columns when body has
// overflow-y:hidden + column-fill:auto, which left the last ~30% of
// long articles unreachable. Scrolled-doc renders the full chapter as
// one tall iframe inside an epub.js-managed scrollable div; goNext/Prev
// scroll that div by one viewport height.

function trace(stage, detail) {
  try {
    console.log("[mr] " + stage + (detail !== undefined ? ": " + detail : ""));
  } catch (_) {}
}

window.onerror = function (message, source, lineno) {
  trace("window.onerror", (message || "") + " @ " + (source || "?") + ":" + (lineno || "?"));
  return false;
};
window.addEventListener("unhandledrejection", function (e) {
  var r = e && e.reason;
  trace("unhandledrejection", r && (r.message || r) || "(no reason)");
});

var book = null;
var rendition = null;
var pendingHref = null;
var currentFontSize = 18;
// Guard against overlapping page-turn calls.
var isNavigating = false;

function notify(name, payload) {
  try {
    if (window.MagazineReader && window.MagazineReader[name]) {
      window.MagazineReader[name](payload || "");
    }
  } catch (_) {}
}

function loadBook(base64Data, href) {
  pendingHref = href || null;
  trace("loadBook.entered", "href=" + (href || "(none)") +
    " base64Length=" + (base64Data ? base64Data.length : 0));
  try {
    if (typeof ePub !== "function") {
      throw new Error("epub.js not loaded — typeof ePub=" + (typeof ePub));
    }
    var raw = atob(base64Data);
    var len = raw.length;
    var bytes = new Uint8Array(len);
    for (var i = 0; i < len; i++) bytes[i] = raw.charCodeAt(i);

    book = ePub(bytes.buffer);

    // Repair producer-side HTML defects before each chapter is parsed
    // as XHTML (which fails on the Economist's malformed drop-caps and
    // unclosed <img> tags). archive.getText is the entry point epub.js
    // calls for every chapter's source text.
    if (book.archive) {
      var origGetText = book.archive.getText.bind(book.archive);
      book.archive.getText = function (path, encoding) {
        var result = origGetText(path, encoding);
        // Pass-through for everything that isn't a chapter — same return
        // type the original returned (sync or Promise). Some epub.js
        // callers expect sync return; wrapping unconditionally with
        // Promise.resolve breaks them.
        if (!/\.x?html?$/i.test(path || "")) return result;
        return Promise.resolve(result).then(function (text) {
          if (typeof text !== "string") return text;
          // Drop-cap collapse: <span class="drop-cap"><</span>b>L</b>
          // → <span class="drop-cap">L</span>. The regex needs TWO `<`
          // between the drop-cap span and </span>: the first is the
          // broken literal `<` the producer emits, the second is the
          // `<` of the </span> closing tag.
          text = text.replace(
            /<span class="drop-cap"><<\/span>b>([A-Za-z])<\/b>/g,
            "<span class=\"drop-cap\">$1</span>"
          );
          // Self-close void elements XHTML requires closed.
          text = text.replace(
            /<(img|br|hr|input|source|wbr)([^>]*)>/g,
            function (m, tag, attrs) {
              if (attrs.trimEnd().endsWith("/")) return m;
              return "<" + tag + attrs + " />";
            }
          );
          return text;
        });
      };
    }

    rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%",
      flow: "scrolled-doc",
      allowScriptedContent: true
    });

    rendition.themes.fontSize(currentFontSize + "px");
    rendition.themes.default({
      "body": { "line-height": "1.6 !important" },
      "img, figure, video": { "max-width": "100% !important", "height": "auto !important" }
    });

    rendition.on("relocated", function (location) {
      isNavigating = false;
      try { notify("onRelocated", location.start.cfi || ""); } catch (_) {}
    });

    book.ready.then(function () {
      var hide = document.getElementById("loading");
      if (hide) hide.style.display = "none";
      // Always display the first chapter first — passing an href that
      // doesn't match epub.js's normalised spine entries makes
      // rendition.display() hang silently. Then navigate to the
      // requested href as a follow-up.
      return rendition.display();
    }).then(function () {
      notify("onReady", "");
      if (pendingHref) return rendition.display(pendingHref);
    }).catch(function (e) {
      trace("ready/display-rejected", e && (e.message || e));
      notify("onError", "ready: " + (e && e.message || e));
    });
  } catch (e) {
    trace("loadBook.threw", e && (e.message || e));
    notify("onError", "loadBook: " + (e && e.message || e));
  }
}

// In scrolled-doc mode epub.js sizes the iframe to the full chapter
// height, so the iframe's own contentWindow has no overflow. The
// scrollable element is the epub.js-managed wrapper (`div.epub-container`,
// overflow:auto) that sits between #viewer and the iframe — walk up
// from the iframe to find it.
function findScrollContainer() {
  var iframes = document.querySelectorAll("#viewer iframe");
  if (!iframes.length) return null;
  var el = iframes[iframes.length - 1].parentElement;
  while (el && el !== document.body) {
    if (el.scrollHeight > el.clientHeight + 1) return el;
    el = el.parentElement;
  }
  return null;
}

// 24px overlap so the last line of a screen reappears as the first line
// of the next, which keeps the reader from losing half a line at a flip.
function pageStep(container) {
  return Math.max(40, (container.clientHeight || 600) - 24);
}

function goNext() {
  if (isNavigating) return;
  isNavigating = true;
  try {
    var c = findScrollContainer();
    if (!c) return;
    var target = Math.min(c.scrollHeight - c.clientHeight, c.scrollTop + pageStep(c));
    if (target > c.scrollTop) c.scrollTop = target;
  } finally {
    isNavigating = false;
  }
}

function goPrev() {
  if (isNavigating) return;
  isNavigating = true;
  try {
    var c = findScrollContainer();
    if (!c) return;
    var target = Math.max(0, c.scrollTop - pageStep(c));
    if (target < c.scrollTop) c.scrollTop = target;
  } finally {
    isNavigating = false;
  }
}

function goToHref(href) {
  pendingHref = href;
  if (rendition) rendition.display(href);
}

function setFontSize(px) {
  currentFontSize = Math.max(10, Math.min(40, px | 0));
  if (rendition) rendition.themes.fontSize(currentFontSize + "px");
}

window.loadBook = loadBook;
window.goNext = goNext;
window.goPrev = goPrev;
window.goToHref = goToHref;
window.setFontSize = setFontSize;
</script>
</body>
</html>
