<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100vh; overflow: hidden; background: #ffffff; color: #000000; }
  body { position: relative; }
  #viewer {
    position: absolute; inset: 0;
    width: 100%; height: 100%; overflow: hidden;
  }
  #loading {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: monospace; font-size: 12px; color: #888;
    z-index: 5;
    white-space: pre;
    text-align: center;
  }
</style>
<script src="jszip.min.js"></script>
<script src="epub.min.js"></script>
</head>
<body>
<div id="viewer"></div>
<div id="loading">Loading…</div>
<script>
// epub.js host page for the Magazine Reader. Receives the ePub bytes and
// the chapter href from the Android side, displays the chapter in
// epub.js's `flow: paginated` mode, exposes goNext / goPrev / setFontSize
// for the Compose tap-zone overlay to call.

// ----- Debug instrumentation ------------------------------------------
// Every checkpoint logs through console.log (Android's WebChromeClient
// forwards these to the MagazineJS logcat tag) and through
// window.MagazineReader.onTrace (the Compose status overlay shows the
// most recent message in plain sight).
function trace(stage, detail) {
  var msg = "[mr] " + stage + (detail !== undefined ? ": " + detail : "");
  try { console.log(msg); } catch (_) {}
  try {
    if (window.MagazineReader && window.MagazineReader.onTrace) {
      window.MagazineReader.onTrace(msg);
    }
  } catch (_) {}
  try {
    var el = document.getElementById("loading");
    if (el && el.style.display !== "none") el.textContent = msg;
  } catch (_) {}
}

window.onerror = function (message, source, lineno, colno, error) {
  trace("window.onerror",
    (message || "") + " @ " + (source || "?") + ":" + (lineno || "?"));
  return false;
};
window.addEventListener("unhandledrejection", function (e) {
  var r = e && e.reason;
  trace("unhandledrejection", r && (r.message || r) || "(no reason)");
});

trace("html-loaded");
trace("epubjs-present", typeof ePub);
trace("jszip-present", typeof JSZip);

var book = null;
var rendition = null;
var pendingHref = null;
var currentFontSize = 18;

function notify(name, payload) {
  try {
    if (window.MagazineReader && window.MagazineReader[name]) {
      window.MagazineReader[name](payload || "");
    }
  } catch (_) {}
}

function loadBook(base64Data, href) {
  pendingHref = href || null;
  trace("loadBook.entered", "href=" + (href || "(none)") +
    " base64Length=" + (base64Data ? base64Data.length : 0));
  try {
    if (typeof ePub !== "function") {
      throw new Error("epub.js not loaded — typeof ePub=" + (typeof ePub));
    }
    var raw = atob(base64Data);
    trace("base64-decoded", "rawBytes=" + raw.length);
    var len = raw.length;
    var bytes = new Uint8Array(len);
    for (var i = 0; i < len; i++) bytes[i] = raw.charCodeAt(i);
    trace("uint8array-built");

    book = ePub(bytes.buffer);
    trace("epub-created");

    rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%",
      flow: "paginated",
      spread: "none",
      allowScriptedContent: false
    });
    trace("rendition-created");

    rendition.themes.fontSize(currentFontSize + "px");
    rendition.themes.default({
      "body": { "line-height": "1.6 !important" },
      "img, figure, video": { "max-width": "100% !important", "height": "auto !important" }
    });

    rendition.on("relocated", function (location) {
      try { notify("onRelocated", location.start.cfi || ""); } catch (_) {}
    });

    book.ready.then(function () {
      trace("book.ready-resolved");
      var hide = document.getElementById("loading");
      if (hide) hide.style.display = "none";
      return pendingHref ? rendition.display(pendingHref) : rendition.display();
    }).then(function () {
      trace("rendition.display-resolved");
      notify("onReady", "");
    }).catch(function (e) {
      trace("book.ready/display-rejected", e && (e.message || e));
      notify("onError", "ready: " + (e && e.message || e));
    });
  } catch (e) {
    trace("loadBook.threw", e && (e.message || e));
    notify("onError", "loadBook: " + (e && e.message || e));
  }
}

function goNext() { if (rendition) rendition.next(); }
function goPrev() { if (rendition) rendition.prev(); }
function goToHref(href) {
  pendingHref = href;
  if (rendition) rendition.display(href);
}
function setFontSize(px) {
  currentFontSize = Math.max(10, Math.min(40, px | 0));
  if (rendition) rendition.themes.fontSize(currentFontSize + "px");
}

window.loadBook = loadBook;
window.goNext = goNext;
window.goPrev = goPrev;
window.goToHref = goToHref;
window.setFontSize = setFontSize;
trace("api-exposed");
</script>
</body>
</html>
